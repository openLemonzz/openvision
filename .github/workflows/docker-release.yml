name: Docker Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Build admin
        run: npm run build:admin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/vision-web
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Extract admin image metadata
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/vision-admin
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=vision-web
          cache-to: type=gha,mode=max,scope=vision-web

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: admin
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha,scope=vision-admin
          cache-to: type=gha,mode=max,scope=vision-admin

      - name: Write release summary
        run: |
          {
            echo "## Docker release"
            echo
            echo "Ref: \`${GITHUB_REF}\`"
            echo
            echo "### vision-web"
            echo '```'
            echo "${{ steps.meta-web.outputs.tags }}"
            echo '```'
            echo
            echo "### vision-admin"
            echo '```'
            echo "${{ steps.meta-admin.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
