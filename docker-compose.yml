services:
  web:
    build:
      context: .
      target: web
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}

  init:
    build:
      context: .
      target: init
    environment:
      SUPABASE_ACCESS_TOKEN: ${SUPABASE_ACCESS_TOKEN:-}
      PROJECT_REF: ${PROJECT_REF:-}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
    restart: "no"
